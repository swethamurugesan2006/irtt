version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo Installing dependencies...
      - python3 -m pip install --upgrade pip
      - python3 -m pip install --no-cache-dir pandas matplotlib yfinance

  build:
    commands:
      - echo Running Python script...
      - mkdir -p output
      - python3 P1.py

artifacts:
  files:
    - '**/*'
  base-directory: output
