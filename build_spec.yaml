version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: "Check Python"
    command: |
      python3 --version

 - type: Command
  name: "Install dependencies"
  command: |
    echo "Checking Python..."
    which python3
    python3 --version

    echo "Installing pip..."
    python3 -m ensurepip --upgrade || true

    echo "Upgrading pip..."
    python3 -m pip install --upgrade pip setuptools wheel

    echo "Installing libraries..."
    python3 -m pip install pandas matplotlib yfinance
  - type: Command
    name: "Run script"
    command: |
      mkdir -p output
      python3 P1.py

outputArtifacts:
  - name: output
    type: BINARY
    location: output
