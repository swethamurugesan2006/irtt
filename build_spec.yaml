version: 0.2

env:
  variables:
    ENV: "dev"

phases:
  install:
    commands:
      - echo "Installing dependencies (if any)..."

  pre_build:
    commands:
      - echo "Pre-build phase started"

  build:
    commands:
      - echo "Listing files..."
      - ls -l
      - echo "Build running successfully"

  post_build:
    commands:
      - echo "Build completed"

artifacts:
  files:
    - '**/*'
  name: output-artifact

cache:
  paths:
    - '/root/.m2/**/*'
