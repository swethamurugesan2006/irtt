version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: Check files
    command: |
      echo "Listing files..."
      ls -l

  - type: Command
    name: Build Step
    command: |
      echo "Build running successfully"
      mkdir -p output
      echo "Hello Swetha" > output/result.txt
      ls -l output

outputArtifacts:
  - name: output
    type: BINARY
    location: output
