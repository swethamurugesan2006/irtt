version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: "Install dependencies"
    command: |
      pip install --upgrade pip
      pip install pandas matplotlib yfinance

  - type: Command
    name: "Run script"
    command: |
      mkdir -p output
      python3 P1.py

outputArtifacts:
  - name: output
    type: BINARY
    location: output
