version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: "Check Python"
    command: |
      python3 --version

  - type: Command
    name: "Install dependencies"
    command: |
      python3 -m pip install --upgrade pip
      python3 -m pip install --no-cache-dir pandas matplotlib yfinance

  - type: Command
    name: "Run script"
    command: |
      mkdir -p output
      python3 P1.py

outputArtifacts:
  - name: output
    type: BINARY
    location: output
